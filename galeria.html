<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galería - Helping Kids Piano Lessons</title>
    
    <script src="./js/language.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'sage-green': '#98A086',
                'dusty-rose': '#A76D5E',
                'golden-tan': '#C4A071',
                'warm-beige': '#DFCCB1',
                'terracotta-brown': '#846044',
                'deep-sage': '#6F7D5C',
                'dark-earth': '#5C4435',
              },
              fontFamily: {
                'varela': ['"Varela Round"', 'sans-serif'],
              }
            }
          }
        }
      </script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .gallery-item:hover .overlay { opacity: 1; }
    </style>
</head>
<body class="bg-warm-beige font-varela text-dark-earth">

    <div id="navbar-placeholder"></div>

    <section class="relative pt-24 pb-16 bg-deep-sage overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-sage-green to-[#5c684c] opacity-90"></div>
        <div class="container mx-auto px-6 text-center relative z-10" data-aos="zoom-in">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4 pb-2 text-transparent bg-clip-text bg-gradient-to-r from-warm-beige to-white drop-shadow-sm">Nuestros Momentos</h1>
            <p class="text-xl md:text-2xl text-warm-beige/90 drop-shadow-md">Explora la magia musical de nuestros estudiantes.</p>
        </div>
    </section>

    <section class="py-16 container mx-auto px-6 min-h-[50vh]">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="gallery-grid">
            </div>
    </section>
   <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col items-center justify-center p-4 backdrop-blur-md transition-all duration-300">
        
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white hover:text-dusty-rose transition text-5xl z-50">&times;</button>
        
        <button onclick="changeMedia(-1); event.stopPropagation();" class="absolute left-2 md:left-8 top-1/2 -translate-y-1/2 text-white/70 hover:text-white hover:scale-110 transition text-5xl md:text-7xl z-50 p-4 drop-shadow-lg hidden md:block">&#10094;</button>
        <button onclick="changeMedia(1); event.stopPropagation();" class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 text-white/70 hover:text-white hover:scale-110 transition text-5xl md:text-7xl z-50 p-4 drop-shadow-lg hidden md:block">&#10095;</button>

        <div class="w-full max-w-5xl flex items-center justify-center h-[85vh]">
            <div id="lightbox-content" class="w-full h-full flex justify-center items-center">
                </div>
        </div>

        <p class="absolute bottom-8 text-white/50 text-sm md:hidden animate-pulse">Desliza para ver más &harr;</p>
    </div>
    <footer class="bg-terracotta-brown py-12 text-warm-beige text-center">
        <div class="container mx-auto px-6">
            <p class="mb-2 text-lg"><i class="fas fa-map-pin text-golden-tan mr-2"></i> 4704 SW 136th Place, Miami, FL 33175</p>
            <p class="mb-6"><i class="fas fa-envelope text-golden-tan mr-2"></i> taniagarcia.151972@gmail.com</p>
            <p class="text-sm opacity-75">&copy; 2026 HelpingKids. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        // 1. EL INVENTARIO DE TUS FOTOS Y VIDEOS
        const mediaItems = [
            { type: 'image', file: 'img (1).jpeg' },
            { type: 'image', file: 'img (2).jpeg' },
            { type: 'image', file: 'img (3).jpeg' },
            { type: 'image', file: 'img (4).jpeg' },
            { type: 'image', file: 'img (5).jpeg' },
            { type: 'image', file: 'img (6).jpeg' },
            { type: 'image', file: 'img (7).jpeg' },
            { type: 'image', file: 'img (8).jpeg' },
            { type: 'image', file: 'img (9).jpeg' },
            { type: 'image', file: 'img (10).jpeg' },
            { type: 'image', file: 'img (11).jpeg' },
            { type: 'image', file: 'img (12).jpeg' },
            { type: 'video', file: 'vid (1).mp4' },
            { type: 'video', file: 'vid (3).mp4' },
            { type: 'video', file: 'vid (4).mp4' }
        ];

        const grid = document.getElementById('gallery-grid');
        const basePath = './assets/gallery/';
        let currentIndex = 0; // Guardará el número de la foto que estamos viendo

        // 2. DIBUJAR LA GALERÍA EN PANTALLA
        mediaItems.forEach((item, index) => {
            const fullPath = basePath + item.file;
            const div = document.createElement('div');
            
            div.className = 'gallery-item relative cursor-pointer overflow-hidden rounded-xl shadow-lg group bg-white';
            div.setAttribute('data-aos', 'fade-up');
            div.setAttribute('data-aos-delay', (index * 50).toString());
            // Ahora le pasamos el "index" (posición) a la función en lugar de la ruta directa
            div.onclick = () => openLightbox(index);

            if (item.type === 'image') {
                div.innerHTML = `
                    <img src="${fullPath}" alt="Galería HelpingKids" loading="lazy" class="w-full h-64 object-cover transition duration-700 group-hover:scale-110">
                    <div class="overlay absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                        <span class="text-white border-2 border-white font-bold px-6 py-2 rounded-full">Ver Foto</span>
                    </div>
                `;
            } else if (item.type === 'video') {
                div.innerHTML = `
                    <div class="w-full h-64 bg-slate-800 flex items-center justify-center transition duration-700 group-hover:bg-slate-700">
                        <i class="fas fa-play-circle text-6xl text-white/80 group-hover:text-white transition"></i>
                    </div>
                    <div class="overlay absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                        <span class="text-white border-2 border-white font-bold px-6 py-2 rounded-full">Reproducir</span>
                    </div>
                `;
            }
            grid.appendChild(div);
        });

        // 3. ABRIR EL LIGHTBOX
        function openLightbox(index) {
            currentIndex = index; // Actualizamos la foto actual
            const item = mediaItems[currentIndex];
            const fullPath = basePath + item.file;
            
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightbox-content');
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');

            if (item.type === 'image') {
                content.innerHTML = `<img src="${fullPath}" class="max-h-full max-w-full rounded-xl shadow-2xl object-contain animate-[zoomIn_0.3s_ease-out]">`;
            } else if (item.type === 'video') {
                content.innerHTML = `
                    <video controls autoplay class="max-h-full max-w-full rounded-xl shadow-2xl animate-[zoomIn_0.3s_ease-out]">
                        <source src="${fullPath}" type="video/mp4">
                        Tu navegador no soporta videos.
                    </video>`;
            }
        }

        // 4. CAMBIAR FOTO/VIDEO (Siguiente o Anterior)
        function changeMedia(direction) {
            currentIndex += direction;
            
            // Si llega al final, vuelve al principio (y viceversa)
            if (currentIndex >= mediaItems.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = mediaItems.length - 1;
            
            openLightbox(currentIndex);
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightbox-content');
            lightbox.classList.add('hidden');
            lightbox.classList.remove('flex');
            content.innerHTML = ''; // Detiene el video al cerrar
        }

        // Cierra si haces clic en el fondo negro
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this || e.target.id === 'lightbox-content') {
                closeLightbox();
            }
        });

        // 5. NAVEGACIÓN CON TECLADO
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('hidden')) {
                if (e.key === 'ArrowLeft') changeMedia(-1);
                if (e.key === 'ArrowRight') changeMedia(1);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        // 6. NAVEGACIÓN DESLIZANDO EL DEDO (MÓVILES)
        let touchStartX = 0;
        let touchEndX = 0;
        const lightboxArea = document.getElementById('lightbox');

        lightboxArea.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        lightboxArea.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            // Requiere deslizar al menos 50 píxeles para que no sea accidental
            if (touchEndX < touchStartX - 50) changeMedia(1); // Deslizó a la izquierda -> Siguiente
            if (touchEndX > touchStartX + 50) changeMedia(-1); // Deslizó a la derecha -> Anterior
        }
    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        
        fetch('./js/navbar.html')
            .then(response => response.text())
            .then(data => {
                const placeholder = document.getElementById('navbar-placeholder');
                if(placeholder) {
                    placeholder.innerHTML = data;
                    initMobileMenu();
                }
            });

        function initMobileMenu() {
            const btn = document.getElementById('mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            if(btn && menu) {
                const toggleMenu = () => {
                    const isOpen = menu.classList.contains('opacity-100');
                    menu.classList.toggle('opacity-100', !isOpen);
                    menu.classList.toggle('pointer-events-auto', !isOpen);
                };
                btn.onclick = toggleMenu;
                document.querySelectorAll('.mobile-link').forEach(link => link.onclick = toggleMenu);
            }
        }
    </script>
</body>
</html>
